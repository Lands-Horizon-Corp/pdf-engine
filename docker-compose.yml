services:
  pdf-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdf-generator
    ports:
      - "6767:6767"
    env_file:
      - .env
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1s bash -c ':> /dev/tcp/127.0.0.1/6767' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: pdf-network
